<div class="login-container">
    <div class="quiensoy">
        <img class = "pregunta" src="assets/pregunta.webp" routerLink="/quiensoy" />
        <p>¿Quién soy?</p>
    </div>
    <div class="centro">
        <h1>Login</h1>
        <img class="logo" src="assets/logo.png" />
    <form (ngSubmit)="onLogin()">
        <input [(ngModel)]="email" name="email" type="text" placeholder="Email" />
        <input [(ngModel)]="password" name="password" type="password" placeholder="Contraseña" />
        @if (errorMessage) {
            <p class="error">{{ errorMessage }}</p>
        }
        <button matButton = "filled" type="submit">Ingresar</button>
        <button type="button" matButton = "tonal" (click)="ingresoRapido()">Ingreso rápido</button>
        <a routerLink="/auth/registro">Registrarse</a>
    </form>
    </div>
</div>
